<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポータブル冷蔵庫 シミュレーター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #1a1a2e;
    color: #eee;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    gap: 24px;
}
.refrigerator {
    background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
    border: 3px solid #444;
    border-radius: 16px;
    padding: 24px;
    width: 500px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.panel-title {
    text-align: center;
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
}
.main-panel {
    background: #0a0a0a;
    border: 2px solid #333;
    border-radius: 8px;
    padding: 14px 10px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    overflow: hidden;
}
.mode-leds {
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: flex-start;
    flex-shrink: 0;
}
.mode-led-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: #555;
    white-space: nowrap;
}
.mode-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #0a1a0a;
    border: 1px solid #333;
    transition: background 0.05s, box-shadow 0.05s;
    flex-shrink: 0;
}
.mode-dot.on { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
.mode-dot-pair { display: flex; gap: 3px; }
.seg7-group {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
}
.digit {
    width: 24px;
    height: 46px;
    flex-shrink: 0;
}
.seg-off { fill: #1c0500; }
.seg-on  { fill: #ff2200; filter: drop-shadow(0 0 2px #ff6600); }
.deg-indicator { display: flex; align-items: center; justify-content: center; }
.deg-label {
    font-size: 16px;
    color: #1c0500;
    font-weight: bold;
    line-height: 1;
    transition: color 0.05s;
}
.deg-label.on { color: #ff2200; text-shadow: 0 0 6px #ff4400; }
.btn {
    background: linear-gradient(145deg, #3a3a3a, #222);
    border: 2px solid #555;
    border-radius: 8px;
    color: #ccc;
    font-size: 11px;
    padding: 10px 8px;
    cursor: pointer;
    user-select: none;
    text-align: center;
    flex-shrink: 0;
    transition: background 0.08s, transform 0.08s;
    min-width: 44px;
}
.btn:active {
    background: linear-gradient(145deg, #111, #2a2a2a);
    border-color: #888;
    color: #fff;
    transform: scale(0.94);
}
.btn-power   { border-color: #ff6644; color: #ff9977; }
.btn-mode    { border-color: #44aaff; color: #77ccff; }
.btn-tempdown, .btn-tempup { border-color: #aaaaaa; }
.panel-sep {
    width: 1px;
    height: 48px;
    background: #2a2a2a;
    flex-shrink: 0;
}
.status-bar {
    background: #111;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 10px;
    color: #666;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}
.status-item span { color: #aaa; }
.error-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.btn-err {
    background: #2a0a0a;
    border: 1px solid #662222;
    border-radius: 4px;
    color: #cc6666;
    font-size: 9px;
    padding: 4px 8px;
    cursor: pointer;
    user-select: none;
}
.btn-err:active { transform: scale(0.95); }
.btn-err.active { background: #550000; border-color: #ff4444; color: #ff9999; }
.sim-panel {
    background: #1e1e2e;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 20px;
    width: 280px;
    font-size: 12px;
}
.sim-panel h3 {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
    margin-bottom: 16px;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
    text-transform: uppercase;
}
.sim-section { margin-bottom: 20px; }
.sim-section h4 { font-size: 11px; color: #aaa; margin-bottom: 10px; }
.slider-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.slider-row label {
    display: flex;
    justify-content: space-between;
    color: #888;
    font-size: 11px;
}
.slider-row label span {
    color: #00ffaa;
    font-weight: bold;
    min-width: 44px;
    text-align: right;
}
input[type=range] { width: 100%; accent-color: #00ffaa; cursor: pointer; }
.tilt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.toggle-sw {
    width: 40px; height: 20px; background: #333;
    border-radius: 10px; cursor: pointer;
    position: relative; transition: background 0.2s; flex-shrink: 0;
}
.toggle-sw.on { background: #ff4444; }
.toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; background: #ccc;
    border-radius: 50%; transition: left 0.2s;
}
.toggle-sw.on .toggle-knob { left: 22px; }
.log-area {
    background: #0a0a0a; border: 1px solid #222;
    border-radius: 4px; padding: 8px;
    height: 160px; overflow-y: auto;
    font-size: 10px; color: #666; font-family: monospace;
}
.log-line { margin-bottom: 2px; }
.log-line.info  { color: #5588aa; }
.log-line.warn  { color: #aaaa55; }
.log-line.error { color: #aa5555; }
</style>
</head>
<body>

<div class="refrigerator">
    <div class="panel-title">Portable Refrigerator</div>

    <div class="main-panel">
        <!-- ① MODEボタン -->
        <div class="btn btn-mode" id="btnMode">MODE</div>

        <div class="panel-sep"></div>

        <!-- ② モードLED -->
        <div class="mode-leds">
            <div class="mode-led-item">
                <div class="mode-dot" id="ledAuto"></div>
                <span>AUTO</span>
            </div>
            <div class="mode-led-item">
                <div class="mode-dot-pair">
                    <div class="mode-dot" id="ledPwr1"></div>
                    <div class="mode-dot" id="ledPwr2"></div>
                </div>
                <span>PWR</span>
            </div>
            <div class="mode-led-item">
                <div class="mode-dot" id="ledEco"></div>
                <span>ECO</span>
            </div>
        </div>

        <div class="panel-sep"></div>

        <!-- ③ 7セグ + ℃ -->
        <div class="seg7-group">
            <svg class="digit" id="digit0" viewBox="0 0 10 18">
                <polygon id="d0_A" class="seg-off" points="1,0  9,0  8,1  2,1"/>
                <polygon id="d0_B" class="seg-off" points="9,1  10,2  9,8  8,7  8,1"/>
                <polygon id="d0_C" class="seg-off" points="9,10 10,11 9,17 8,16 8,10"/>
                <polygon id="d0_D" class="seg-off" points="2,17 8,17  9,18  1,18"/>
                <polygon id="d0_E" class="seg-off" points="0,11  1,10  2,10  2,16  1,17"/>
                <polygon id="d0_F" class="seg-off" points="0,2  1,1  2,1  2,7  1,8"/>
                <polygon id="d0_G" class="seg-off" points="1,9  2,8  8,8  9,9  8,10 2,10"/>
            </svg>
            <svg class="digit" id="digit1" viewBox="0 0 10 18">
                <polygon id="d1_A" class="seg-off" points="1,0  9,0  8,1  2,1"/>
                <polygon id="d1_B" class="seg-off" points="9,1  10,2  9,8  8,7  8,1"/>
                <polygon id="d1_C" class="seg-off" points="9,10 10,11 9,17 8,16 8,10"/>
                <polygon id="d1_D" class="seg-off" points="2,17 8,17  9,18  1,18"/>
                <polygon id="d1_E" class="seg-off" points="0,11  1,10  2,10  2,16  1,17"/>
                <polygon id="d1_F" class="seg-off" points="0,2  1,1  2,1  2,7  1,8"/>
                <polygon id="d1_G" class="seg-off" points="1,9  2,8  8,8  9,9  8,10 2,10"/>
            </svg>
            <svg class="digit" id="digit2" viewBox="0 0 10 18">
                <polygon id="d2_A" class="seg-off" points="1,0  9,0  8,1  2,1"/>
                <polygon id="d2_B" class="seg-off" points="9,1  10,2  9,8  8,7  8,1"/>
                <polygon id="d2_C" class="seg-off" points="9,10 10,11 9,17 8,16 8,10"/>
                <polygon id="d2_D" class="seg-off" points="2,17 8,17  9,18  1,18"/>
                <polygon id="d2_E" class="seg-off" points="0,11  1,10  2,10  2,16  1,17"/>
                <polygon id="d2_F" class="seg-off" points="0,2  1,1  2,1  2,7  1,8"/>
                <polygon id="d2_G" class="seg-off" points="1,9  2,8  8,8  9,9  8,10 2,10"/>
            </svg>
            <div class="deg-indicator">
                <div class="deg-label" id="degLabel">℃</div>
            </div>
        </div>

        <div class="panel-sep"></div>

        <!-- ④ 温度▼ / 温度▲ -->
        <div class="btn btn-tempdown" id="btnTempDown">▼</div>
        <div class="btn btn-tempup"   id="btnTempUp">▲</div>

        <div class="panel-sep"></div>

        <!-- ⑤ 電源ボタン -->
        <div class="btn btn-power" id="btnPower">電源</div>
    </div>
    <!-- status-bar・error-row は削除 -->
</div>

<div class="sim-panel">
    <h3>Simulator Control</h3>
    <div class="sim-section">
        <h4>🌡️ 庫内温度（サーミスタ模擬）</h4>
        <div class="slider-row">
            <label>庫内温度 <span id="sliderInsideVal">20</span>℃</label>
            <input type="range" id="sliderInside" min="-50" max="110" value="20" step="1">
        </div>
        <div style="font-size:10px; color:#555; margin-top:-6px;">
            ※ ≤-40℃→[Lo] / ≥100℃→[Hi] / 安定化1秒後に反映
        </div>
    </div>
    <div class="sim-section">
        <h4>🔧 基板温度</h4>
        <div class="slider-row">
            <label>基板温度 <span id="sliderBoardVal">25</span>℃</label>
            <input type="range" id="sliderBoard" min="0" max="100" value="25" step="1">
        </div>
        <div style="font-size:10px; color:#555; margin-top:-6px;">
            ※ ≥65℃を5秒継続→E07 / 63℃以下5秒で解除
        </div>
    </div>
    <div class="sim-section">
        <h4>📐 傾斜センサー</h4>
        <div class="tilt-row">
            <div class="toggle-sw" id="tiltToggle">
                <div class="toggle-knob"></div>
            </div>
            <span style="font-size:11px; color:#888;" id="tiltLabel">正常（転倒なし）</span>
        </div>
    </div>

    <!-- エラー注入をシミュレーターパネルへ移動 -->
    <div class="sim-section">
        <h4>⚠️ エラー注入（テスト用）</h4>
        <div class="error-row">
            <div class="btn-err" id="errTilt">E00:転倒</div>
            <div class="btn-err" id="errComp1">E01:入力電圧</div>
            <div class="btn-err" id="errComp2">E02:ファン電流</div>
            <div class="btn-err" id="errComp3">E03:始動失敗</div>
            <div class="btn-err" id="errComp4">E04:最低速異常</div>
            <div class="btn-err" id="errComp5">E05:温度異常</div>
            <div class="btn-err" id="errThm">E06:サーミスタ</div>
            <div class="btn-err" id="errBord">E07:基板高温</div>
        </div>
    </div>

    <div class="sim-section">
        <h4>📋 イベントログ</h4>
        <div class="log-area" id="logArea"></div>
        <button id="btnClearLog"
            style="margin-top:6px; background:#222; border:1px solid #333;
                   color:#666; font-size:10px; padding:3px 10px;
                   cursor:pointer; border-radius:4px;">
            クリア
        </button>
    </div>
</div>

<script>
(function () {
    var SEG_FONT = [
        0x3F, //0
        0x06, //1
        0x5B, //2
        0x4F, //3
        0x66, //4
        0x6D, //5
        0x7D, //6
        0x07, //7
        0x7F, //8
        0x6F, //9
        0x79, //E
        0x74, //h
    ];

    var CHAR_H     = 0x76;
    var CHAR_i     = 0x04;
    var CHAR_L     = 0x38;
    var CHAR_o     = 0x5C;
    var CHAR_BLANK = 0x00;
    var B_NEGATIVE = 0x40;

    var ERROR_BITS = {
        tilt:  0x0080,
        comp1: 0x0001,
        comp2: 0x0002,
        comp3: 0x0004,
        comp4: 0x0008,
        comp5: 0x0010,
        thm:   0x0020,
        bord:  0x0040,
    };

    var ERROR_ORDER = ['tilt','comp1','comp2','comp3','comp4','comp5','thm','bord'];
    var ERROR_CODES = {
        tilt:  [SEG_FONT[10], SEG_FONT[0], SEG_FONT[0]],
        comp1: [SEG_FONT[10], SEG_FONT[0], SEG_FONT[1]],
        comp2: [SEG_FONT[10], SEG_FONT[0], SEG_FONT[2]],
        comp3: [SEG_FONT[10], SEG_FONT[0], SEG_FONT[3]],
        comp4: [SEG_FONT[10], SEG_FONT[0], SEG_FONT[4]],
        comp5: [SEG_FONT[10], SEG_FONT[0], SEG_FONT[5]],
        thm:   [SEG_FONT[10], SEG_FONT[0], SEG_FONT[6]],
        bord:  [SEG_FONT[10], SEG_FONT[0], SEG_FONT[7]],
    };

    var STAT_IDLE  = 0;
    var STAT_RUN   = 1;
    var STAT_ERROR = 2;
    var MODE_AUTO     = 0;
    var MODE_POWERFUL = 1;
    var MODE_ECO      = 2;
    var TEMP_MIN  = -20;
    var TEMP_MAX  =  20;
    var TEMP_INIT =   5;

    var D_STANDBY_TIME           = 30;
    var D_SETTING_TIMEOUT        = 50;
    var D_INSIDE_STABLE_CNT      = 10;
    var LED_BLINK_RELOAD         = 10;
    var LED_BLINK_HALF           = 5;
    var LED_ERR_WAIT             = 20;
    var LED_ERR_BLANK_BOUNDARY   = 10;
    var LONG_PRESS_MS            = 500;
    var LONG_REPEAT_MS           = 150;
    var D_CHATA_BORD_ERR         = 50;
    var D_CHATA_BORD_RELEASE     = 50;
    var D_BORD_ERR_THRESHOLD     = 65;
    var D_BORD_RELEASE_THRESHOLD = 63;

    var g = {
        stat:                        STAT_IDLE,
        scUserFinalizedTemp:         TEMP_INIT,
        scUserSelectedTemp:          TEMP_INIT,
        scInsideThmTmpDeg:           20,
        scBoardThmTmpDeg:            25,
        scInsideThmDispDeg:          20,
        scInsideCandidate:           20,
        ucUserSettingMode:           MODE_AUTO,
        usError_Flg:                 0,
        ucTm100m_StandbyTime:        0,
        scTm100m_SettingWait:        0,
        ucTm100m_InsideCandidateCnt: 0,
        ucTm10ms_LedBlink:           LED_BLINK_RELOAD,
        ucFlg_ErrDisp:               false,
        ucErrorDisplayIndex:         0,
        ucTotalErrorCount:           0,
        ucTm100m_LedWaitTime:        0,
        ucTm100m_BordErrTime:        0,
        ucTm100m_BordReleaseTime:    0,
        ucFlg_ResumeStandby:         false,
        //起動待ち中に注入されたエラーを保留するフラグ
        ucFlg_PendingError:          false,
    };

    var btnPressTimer  = {};
    var btnRepeatTimer = {};
    var btnIsLong      = {};

    var BTN_ID_MAP = {
        power:    'btnPower',
        mode:     'btnMode',
        tempdown: 'btnTempDown',
        tempup:   'btnTempUp',
    };

    //------------------------------------------------------------
    //  ログ出力
    //------------------------------------------------------------
    function addLog(msg, type) {
        var area = document.getElementById('logArea');
        if (!area) { return; }
        var now = new Date();
        var ts  = pad2(now.getMinutes()) + ':' + pad2(now.getSeconds()) + '.'
                + Math.floor(now.getMilliseconds() / 100);
        var div = document.createElement('div');
        div.className   = 'log-line ' + (type || '');
        div.textContent = '[' + ts + '] ' + msg;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
        while (area.children.length > 120) {
            area.removeChild(area.firstChild);
        }
    }

    function pad2(n) {
        return n < 10 ? '0' + n : '' + n;
    }

    function clearLog() {
        var area = document.getElementById('logArea');
        if (area) { area.innerHTML = ''; }
    }

    //------------------------------------------------------------
    //  ボタン処理
    //------------------------------------------------------------
    function onBtnPointerDown(key) {
        btnIsLong[key]     = false;
        btnPressTimer[key] = setTimeout(function () {
            btnIsLong[key] = true;
            handleKey(key, true);
            if (key === 'tempdown' || key === 'tempup') {
                btnRepeatTimer[key] = setInterval(function () {
                    handleKey(key, true);
                }, LONG_REPEAT_MS);
            }
        }, LONG_PRESS_MS);
    }

    function onBtnPointerUp(key) {
        if (btnPressTimer[key]) {
            clearTimeout(btnPressTimer[key]);
            btnPressTimer[key] = null;
        }
        if (btnRepeatTimer[key]) {
            clearInterval(btnRepeatTimer[key]);
            btnRepeatTimer[key] = null;
        }
        if (!btnIsLong[key]) {
            handleKey(key, false);
        }
        btnIsLong[key] = false;
    }

    //------------------------------------------------------------
    //  キー処理
    //------------------------------------------------------------
    function handleKey(key, isLong) {
        if (g.stat === STAT_IDLE) {
            handleKeyIdle(key, isLong);
        } else if (g.stat === STAT_RUN) {
            handleKeyRun(key, isLong);
        } else if (g.stat === STAT_ERROR) {
            handleKeyError(key, isLong);
        }
    }

    function handleKeyIdle(key, isLong) {
        if (key === 'power' && !isLong) {
            enterRun();
        }
    }

    function handleKeyRun(key, isLong) {
        //起動待ち中はボタン入力を受け付けない
        if (g.ucTm100m_StandbyTime > 0) {
            return;
        }
        if (key === 'power' && !isLong) {
            if (g.scTm100m_SettingWait > 0) {
                g.scUserFinalizedTemp = g.scUserSelectedTemp;
            }
            enterIdle();
            return;
        }
        if (key === 'mode' && !isLong) {
            if (g.ucUserSettingMode >= MODE_ECO) {
                g.ucUserSettingMode = MODE_AUTO;
            } else {
                g.ucUserSettingMode++;
            }
            addLog('モード変更: ' + ['AUTO','POWERFUL','ECO'][g.ucUserSettingMode], 'info');
            return;
        }
        if (key === 'tempdown') {
            if (g.scTm100m_SettingWait === 0) {
                g.scUserSelectedTemp = g.scUserFinalizedTemp;
            } else {
                if (g.scUserSelectedTemp > TEMP_MIN) {
                    g.scUserSelectedTemp--;
                }
            }
            g.ucTm10ms_LedBlink    = LED_BLINK_RELOAD;
            g.scTm100m_SettingWait = D_SETTING_TIMEOUT;
            addLog('温度▼: 選択=' + g.scUserSelectedTemp + '℃', 'info');
            return;
        }
        if (key === 'tempup') {
            if (g.scTm100m_SettingWait === 0) {
                g.scUserSelectedTemp = g.scUserFinalizedTemp;
            } else {
                if (g.scUserSelectedTemp < TEMP_MAX) {
                    g.scUserSelectedTemp++;
                }
            }
            g.ucTm10ms_LedBlink    = LED_BLINK_RELOAD;
            g.scTm100m_SettingWait = D_SETTING_TIMEOUT;
            addLog('温度▲: 選択=' + g.scUserSelectedTemp + '℃', 'info');
            return;
        }
    }

    function handleKeyError(key, isLong) {
        if (key === 'power' && !isLong) {
            //エラー中でも電源OFFでIDLEへ遷移する
            g.usError_Flg         = 0;
            g.ucFlg_ResumeStandby = false;
            g.ucFlg_PendingError  = false;
            //エラー注入ボタンの表示をリセット
            clearAllErrorButtons();
            enterIdle();
            addLog('エラー中 電源OFF → IDLE', 'warn');
        }
    }

    //------------------------------------------------------------
    //  状態遷移
    //------------------------------------------------------------
    function enterRun() {
        g.stat                        = STAT_RUN;
        g.ucTm100m_StandbyTime        = D_STANDBY_TIME;
        g.scTm100m_SettingWait        = 0;
        g.scUserSelectedTemp          = g.scUserFinalizedTemp;
        g.ucTm10ms_LedBlink           = LED_BLINK_RELOAD;
        g.scInsideThmDispDeg          = g.scInsideThmTmpDeg;
        g.scInsideCandidate           = g.scInsideThmTmpDeg;
        g.ucTm100m_InsideCandidateCnt = 0;
        g.ucFlg_ResumeStandby         = false;
        addLog('電源ON → RUN (起動待ち3秒)', 'info');
    }

    function enterIdle() {
        g.stat                 = STAT_IDLE;
        g.ucTm100m_StandbyTime = 0;
        g.scTm100m_SettingWait = 0;
        g.ucTm10ms_LedBlink    = 0;
        g.ucFlg_ResumeStandby  = false;
        g.ucFlg_PendingError   = false;
        addLog('電源OFF → IDLE', 'info');
    }

    function enterError() {
        //起動待ち中にエラーが発生した場合は保留する
        if (g.stat === STAT_RUN && g.ucTm100m_StandbyTime > 0) {
            g.ucFlg_PendingError  = true;
            g.ucFlg_ResumeStandby = false;
            addLog('起動待ち中エラー発生 → 起動待ち終了後に発令', 'warn');
            return;
        }
        g.stat              = STAT_ERROR;
        g.ucFlg_ErrDisp     = false;
        g.ucTm10ms_LedBlink = LED_BLINK_RELOAD;
        addLog('→ ERROR遷移', 'error');
    }

    //------------------------------------------------------------
    //  エラー解除後のRUN復帰チェック
    //  エラーが全解除されたとき呼び出す
    //------------------------------------------------------------
    function checkErrorClear() {
        if (g.usError_Flg !== 0) {
            return;
        }
        //エラー全解除 → RUN復帰
        g.stat = STAT_RUN;
        addLog('全エラー解除 → RUN復帰', 'info');
    }

    //------------------------------------------------------------
    //  エラー注入
    //  IDLE中は注入しない（電源ON後のみ有効）
    //------------------------------------------------------------
    function toggleError(errKey) {
        var bit = ERROR_BITS[errKey];
        var elId, el;
        if (!bit) { return; }

        //IDLE中はエラー注入を無視
        if (g.stat === STAT_IDLE) {
            addLog('電源OFF中のエラー注入は無効', 'warn');
            return;
        }

        g.usError_Flg ^= bit;
        elId = 'err' + errKey.charAt(0).toUpperCase() + errKey.slice(1);
        el   = document.getElementById(elId);
        if (el) { el.classList.toggle('active', !!(g.usError_Flg & bit)); }

        if (g.usError_Flg !== 0 && g.stat !== STAT_ERROR) {
            enterError();
            addLog('エラー注入: ' + errKey + ' → ERROR', 'error');
        }
        if (g.usError_Flg === 0 && g.stat === STAT_ERROR) {
            checkErrorClear();
        }
    }

    //------------------------------------------------------------
    //  傾斜センサー
    //  IDLE中は動作しない
    //------------------------------------------------------------
    function onTiltToggle() {
        var isTilt  = !(g.usError_Flg & ERROR_BITS.tilt);
        var swEl    = document.getElementById('tiltToggle');
        var lblEl   = document.getElementById('tiltLabel');
        var errEl   = document.getElementById('errTilt');

        if (isTilt) {
            //IDLE中は転倒フラグを立てない
            if (g.stat === STAT_IDLE) {
                if (swEl)  { swEl.classList.add('on'); }
                if (lblEl) { lblEl.textContent = '転倒検知（電源OFF中）'; }
                addLog('電源OFF中の傾斜検知は無効', 'warn');
                return;
            }
            g.usError_Flg |= ERROR_BITS.tilt;
            if (swEl)  { swEl.classList.add('on'); }
            if (lblEl) { lblEl.textContent = '転倒検知！'; }
            if (errEl) { errEl.classList.add('active'); }
            if (g.stat !== STAT_ERROR) { enterError(); }
            addLog('傾斜センサー ON → ERROR', 'error');
        } else {
            g.usError_Flg &= ~ERROR_BITS.tilt;
            if (swEl)  { swEl.classList.remove('on'); }
            if (lblEl) { lblEl.textContent = '正常（転倒なし）'; }
            if (errEl) { errEl.classList.remove('active'); }
            if (g.stat === STAT_ERROR) {
                checkErrorClear();
            }
        }
    }

    //------------------------------------------------------------
    //  スライダー
    //------------------------------------------------------------
    function onSliderInside(val) {
        g.scInsideThmTmpDeg = parseInt(val, 10);
        var el = document.getElementById('sliderInsideVal');
        if (el) { el.textContent = val; }
    }

    function onSliderBoard(val) {
        g.scBoardThmTmpDeg = parseInt(val, 10);
        var el = document.getElementById('sliderBoardVal');
        if (el) { el.textContent = val; }
    }

    //------------------------------------------------------------
    //  E07基板高温エラー監視
    //  IDLE中は監視しない（電源ON後のみ有効）
    //------------------------------------------------------------
    function checkBoardTempError() {
        var errEl;
        //IDLE中は監視しない
        if (g.stat === STAT_IDLE) {
            g.ucTm100m_BordErrTime     = D_CHATA_BORD_ERR;
            g.ucTm100m_BordReleaseTime = D_CHATA_BORD_RELEASE;
            return;
        }
        if (g.usError_Flg & ERROR_BITS.bord) {
            //E07発生中: 63℃以下で解除タイマーカウント
            if (g.scBoardThmTmpDeg <= D_BORD_RELEASE_THRESHOLD) {
                if (g.ucTm100m_BordReleaseTime > 0) {
                    g.ucTm100m_BordReleaseTime--;
                }
                if (g.ucTm100m_BordReleaseTime === 0) {
                    g.usError_Flg &= ~ERROR_BITS.bord;
                    errEl = document.getElementById('errBord');
                    if (errEl) { errEl.classList.remove('active'); }
                    addLog('E07解除(63℃以下5秒継続)', 'info');
                    if (g.stat === STAT_ERROR) {
                        checkErrorClear();
                    }
                }
            } else {
                //63℃超: 解除タイマーリセット
                g.ucTm100m_BordReleaseTime = D_CHATA_BORD_RELEASE;
            }
            g.ucTm100m_BordErrTime = D_CHATA_BORD_ERR;
        } else {
            //E07未発生: 65℃以上で発生タイマーカウント
            if (g.scBoardThmTmpDeg >= D_BORD_ERR_THRESHOLD) {
                if (g.ucTm100m_BordErrTime > 0) {
                    g.ucTm100m_BordErrTime--;
                }
                if (g.ucTm100m_BordErrTime === 0) {
                    g.usError_Flg |= ERROR_BITS.bord;
                    errEl = document.getElementById('errBord');
                    if (errEl) { errEl.classList.add('active'); }
                    if (g.stat !== STAT_ERROR) {
                        enterError();
                    }
                    addLog('基板温度=' + g.scBoardThmTmpDeg + '℃ 5秒継続 → E07発生', 'error');
                    g.ucTm100m_BordReleaseTime = D_CHATA_BORD_RELEASE;
                }
            } else {
                g.ucTm100m_BordErrTime = D_CHATA_BORD_ERR;
            }
        }
    }

    //------------------------------------------------------------
    //  100msメインループ
    //------------------------------------------------------------
    setInterval(function () {
        if (g.ucTm10ms_LedBlink > 0) {
            g.ucTm10ms_LedBlink--;
            if (g.ucTm10ms_LedBlink === 0) {
                g.ucTm10ms_LedBlink = LED_BLINK_RELOAD;
            }
        }
        tick100msTimers();
        checkBoardTempError();
        if (g.stat === STAT_RUN) {
            if (g.scTm100m_SettingWait === -1) {
                g.scTm100m_SettingWait = 0;
                g.scUserFinalizedTemp  = g.scUserSelectedTemp;
                addLog('設定確定: ' + g.scUserFinalizedTemp + '℃', 'warn');
            }
        }
        driveLed();
        updateStatusBar();
    }, 100);

    function tick100msTimers() {
        if (g.ucTm100m_StandbyTime > 0) {
            g.ucTm100m_StandbyTime--;
            //起動待ち終了タイミングで保留エラーを発令する
            if (g.ucTm100m_StandbyTime === 0 && g.ucFlg_PendingError) {
                g.ucFlg_PendingError = false;
                if (g.usError_Flg !== 0) {
                    g.stat              = STAT_ERROR;
                    g.ucFlg_ErrDisp     = false;
                    g.ucTm10ms_LedBlink = LED_BLINK_RELOAD;
                    addLog('起動待ち終了 → 保留エラー発令', 'error');
                }
            }
        }
        if (g.scTm100m_SettingWait > 0) {
            g.scTm100m_SettingWait--;
            if (g.scTm100m_SettingWait === 0) {
                g.scTm100m_SettingWait = -1;
            }
        }
        if (g.ucTm100m_InsideCandidateCnt > 0) {
            g.ucTm100m_InsideCandidateCnt--;
        }
        if (g.ucTm100m_LedWaitTime > 0) {
            g.ucTm100m_LedWaitTime--;
        }
    }

    //------------------------------------------------------------
    //  安定化温度取得
    //------------------------------------------------------------
    function getStableInsideTemp(rawTemp) {
        if (g.scInsideCandidate !== rawTemp) {
            g.scInsideCandidate           = rawTemp;
            g.ucTm100m_InsideCandidateCnt = D_INSIDE_STABLE_CNT;
        }
        if (g.ucTm100m_InsideCandidateCnt === 0) {
            g.scInsideThmDispDeg = g.scInsideCandidate;
        }
        return g.scInsideThmDispDeg;
    }

    //------------------------------------------------------------
    //  7セグ温度変換
    //------------------------------------------------------------
    function calc7segTemp(temp) {
        var disp = [CHAR_BLANK, CHAR_BLANK, CHAR_BLANK];
        var negative, absTemp, ones, tens;
        if (temp >= 100) {
            disp[1] = CHAR_H;
            disp[2] = CHAR_i;
            return disp;
        }
        if (temp <= -40) {
            disp[1] = CHAR_L;
            disp[2] = CHAR_o;
            return disp;
        }
        negative = (temp < 0);
        absTemp  = Math.abs(temp);
        ones     = absTemp % 10;
        tens     = Math.floor(absTemp / 10);
        if (absTemp >= 10) {
            disp[2] = SEG_FONT[ones];
            disp[1] = SEG_FONT[tens];
            if (negative) { disp[0] = B_NEGATIVE; }
        } else {
            disp[2] = SEG_FONT[ones];
            if (negative) { disp[1] = B_NEGATIVE; }
        }
        return disp;
    }

    //------------------------------------------------------------
    //  LED駆動
    //------------------------------------------------------------
    function driveLed() {
        var dat = [CHAR_BLANK, CHAR_BLANK, CHAR_BLANK, 0x00];
        if (g.stat === STAT_IDLE) {
            ctrLedStateIdle(dat);
        } else if (g.stat === STAT_RUN) {
            ctrLedStateRun(dat);
        } else if (g.stat === STAT_ERROR) {
            ctrLedStateErr(dat);
        }
        applyDispDat(dat);
    }

    function ctrLedStateIdle(dat) {
        //全消灯: BLANKのまま
    }

    function ctrLedStateRun(dat) {
        var d;
        if (g.ucTm100m_StandbyTime > 0) {
            //起動待ち: 7セグ消灯、GR4全点灯
            getStableInsideTemp(g.scInsideThmTmpDeg);
            dat[0] = 0x00;
            dat[1] = 0x00;
            dat[2] = 0x00;
            dat[3] = 0x3F;
            return;
        }
        if (g.scTm100m_SettingWait === 0) {
            d = calc7segTemp(getStableInsideTemp(g.scInsideThmTmpDeg));
            dat[0] = d[0];
            dat[1] = d[1];
            dat[2] = d[2];
            dat[3] |= 0x01;
        } else {
            if (g.ucTm10ms_LedBlink > LED_BLINK_HALF) {
                d = calc7segTemp(g.scUserSelectedTemp);
                dat[0] = d[0];
                dat[1] = d[1];
                dat[2] = d[2];
                dat[3] |= 0x01;
            }
        }
        if (g.ucUserSettingMode === MODE_AUTO) {
            dat[3] |= 0x10;
        } else if (g.ucUserSettingMode === MODE_POWERFUL) {
            dat[3] |= 0x06;
        } else if (g.ucUserSettingMode === MODE_ECO) {
            dat[3] |= 0x08;
        }
    }

    function ctrLedStateErr(dat) {
        var key, pat, d;
        if (!g.ucFlg_ErrDisp) {
            g.ucFlg_ErrDisp        = true;
            g.ucTotalErrorCount    = getActiveErrorCount();
            g.ucErrorDisplayIndex  = 0;
            g.ucTm100m_LedWaitTime = LED_ERR_WAIT;
        }
        if (g.ucTm100m_LedWaitTime > LED_ERR_BLANK_BOUNDARY) {
            if (g.ucErrorDisplayIndex < g.ucTotalErrorCount) {
                key = getNthActiveErrorKey(g.ucErrorDisplayIndex);
                if (key) {
                    pat    = ERROR_CODES[key];
                    dat[0] = pat[0];
                    dat[1] = pat[1];
                    dat[2] = pat[2];
                }
            } else {
                d = calc7segTemp(getStableInsideTemp(g.scInsideThmTmpDeg));
                dat[0] = d[0];
                dat[1] = d[1];
                dat[2] = d[2];
                dat[3] |= 0x01;
            }
        }
        //ERROR中もモードLEDは現在のモードを表示し続ける
        if (g.ucUserSettingMode === MODE_AUTO) {
            dat[3] |= 0x10;
        } else if (g.ucUserSettingMode === MODE_POWERFUL) {
            dat[3] |= 0x06;
        } else if (g.ucUserSettingMode === MODE_ECO) {
            dat[3] |= 0x08;
        }
        if (g.ucTm100m_LedWaitTime === 0) {
            g.ucErrorDisplayIndex++;
            if (g.ucErrorDisplayIndex > g.ucTotalErrorCount) {
                g.ucErrorDisplayIndex = 0;
                g.ucTotalErrorCount   = getActiveErrorCount();
            }
            g.ucTm100m_LedWaitTime = LED_ERR_WAIT;
        }
    }

    function getActiveErrorCount() {
        var cnt = 0;
        var i;
        for (i = 0; i < ERROR_ORDER.length; i++) {
            if (g.usError_Flg & ERROR_BITS[ERROR_ORDER[i]]) { cnt++; }
        }
        return cnt;
    }

    function getNthActiveErrorKey(n) {
        var cnt = 0;
        var i;
        for (i = 0; i < ERROR_ORDER.length; i++) {
            if (g.usError_Flg & ERROR_BITS[ERROR_ORDER[i]]) {
                if (cnt === n) { return ERROR_ORDER[i]; }
                cnt++;
            }
        }
        return null;
    }

    //------------------------------------------------------------
    //  DOM反映
    //------------------------------------------------------------
    function applyDispDat(dat) {
        applySegBits('d0', dat[0]);
        applySegBits('d1', dat[1]);
        applySegBits('d2', dat[2]);
        setElemOn('degLabel', !!(dat[3] & 0x01));
        setElemOn('ledAuto',  !!(dat[3] & 0x10));
        setElemOn('ledPwr1',  !!(dat[3] & 0x02));
        setElemOn('ledPwr2',  !!(dat[3] & 0x04));
        setElemOn('ledEco',   !!(dat[3] & 0x08));
    }

    function applySegBits(prefix, bits) {
        var names = ['A','B','C','D','E','F','G'];
        var i, el;
        for (i = 0; i < 7; i++) {
            el = document.getElementById(prefix + '_' + names[i]);
            if (!el) { continue; }
            el.setAttribute('class', (bits & (1 << i)) ? 'seg-on' : 'seg-off');
        }
    }

    function setElemOn(id, on) {
        var el = document.getElementById(id);
        if (!el) { return; }
        if (on) {
            el.classList.add('on');
        } else {
            el.classList.remove('on');
        }
    }

    function updateStatusBar() {
        //ステータスバー削除のため何もしない
    }

    //------------------------------------------------------------
    //  イベントリスナー登録
    //------------------------------------------------------------
    (function bindEvents() {
        var btnKeys = ['power','mode','tempdown','tempup'];
        var bi;
        for (bi = 0; bi < btnKeys.length; bi++) {
            (function (k) {
                var btnEl = document.getElementById(BTN_ID_MAP[k]);
                if (!btnEl) { return; }
                btnEl.addEventListener('pointerdown', function (e) {
                    e.preventDefault();
                    onBtnPointerDown(k);
                });
                btnEl.addEventListener('pointerup', function (e) {
                    e.preventDefault();
                    onBtnPointerUp(k);
                });
                btnEl.addEventListener('pointercancel', function () {
                    onBtnPointerUp(k);
                });
            }(btnKeys[bi]));
        }

        var errMap = [
            {id: 'errTilt',  key: 'tilt'},
            {id: 'errComp1', key: 'comp1'},
            {id: 'errComp2', key: 'comp2'},
            {id: 'errComp3', key: 'comp3'},
            {id: 'errComp4', key: 'comp4'},
            {id: 'errComp5', key: 'comp5'},
            {id: 'errThm',   key: 'thm'},
            {id: 'errBord',  key: 'bord'},
        ];
        var ei;
        for (ei = 0; ei < errMap.length; ei++) {
            (function (item) {
                var errEl = document.getElementById(item.id);
                if (!errEl) { return; }
                errEl.addEventListener('click', function () { toggleError(item.key); });
            }(errMap[ei]));
        }

        var tiltEl = document.getElementById('tiltToggle');
        if (tiltEl) {
            tiltEl.addEventListener('click', function () { onTiltToggle(); });
        }

        var sInside = document.getElementById('sliderInside');
        if (sInside) {
            sInside.addEventListener('input', function () { onSliderInside(this.value); });
        }
        var sBoard = document.getElementById('sliderBoard');
        if (sBoard) {
            sBoard.addEventListener('input', function () { onSliderBoard(this.value); });
        }

        var clearBtn = document.getElementById('btnClearLog');
        if (clearBtn) {
            clearBtn.addEventListener('click', function () { clearLog(); });
        }
    }());

    driveLed();
    updateStatusBar();
    addLog('シミュレーター起動', 'info');

}());
</script>
</body>
